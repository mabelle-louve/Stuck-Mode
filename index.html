<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stuck Mode</title>

  <style>
    :root {
      --bg: #f4f5f7;
      --text: #2e2e2e;
      --muted: #6f7682;
      --button: #2e2e2e;
      --button-text: #ffffff;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    main {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 24px;
      min-height: 320px;
    }

    section {
      position: absolute;
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    section.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      line-height: 1.4;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
    }

    button {
      padding: 16px;
      font-size: 1rem;
      border-radius: 12px;
      border: none;
      background: var(--button);
      color: var(--button-text);
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      color: var(--muted);
      padding: 12px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choices button {
      background: #ffffff;
      color: var(--text);
      border: 1px solid #ddd;
    }

    /* Breathing text animation */
    @keyframes breathe {
      0%   { transform: scale(1); opacity: 0.8; }
      50%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    #breath-text {
      animation: breathe 6s ease-in-out infinite;
      text-align: center;
    }

    /* Breathing screen container */
    #screen-breathe {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      text-align: center;
    }

    /* Subtle background pulse animation */
    @keyframes breathe-bg {
      0%   { background-color: #f4f5f7; }
      50%  { background-color: #e0e4eb; }
      100% { background-color: #f4f5f7; }
    }

    #screen-breathe.active {
      animation: breathe-bg 6s ease-in-out infinite;
    }

  </style>
</head>

<body>
  <main>

    <!-- Screen 1: Permission -->
    <section id="screen-1" class="active">
      <h1>Feeling stuck is okay.</h1>
      <p>You don’t have to fix everything right now.</p>
      <button onclick="goTo(2)">Help me take one small step</button>
      <button class="secondary" onclick="exitApp()">Not now</button>
    </section>

    <!-- Screen 2: Type of stuck -->
    <section id="screen-2">
      <h1>What kind of stuck?</h1>
      <div class="choices">
        <button onclick="choose('overloaded')">My mind feels overloaded</button>
        <button onclick="choose('low-energy')">I have no energy</button>
        <button onclick="choose('unsure')">I don’t even know</button>
      </div>
    </section>

    <!-- Screen Breathing -->
    <section id="screen-breathe">
      <h1 id="breath-text">Inhale</h1>
      <p>Slow breath...</p>
    </section>

    <!-- Screen 3: Gentle step -->
    <section id="screen-3">
      <h1 id="step-text"></h1>
      <p id="step-subtext"></p>
      <button onclick="goTo(4)">I did it</button>
    </section>

    <!-- Screen 4: Acknowledgement -->
    <section id="screen-4">
      <h1>That was enough.</h1>
      <p>You can stop here.</p>
      <button onclick="goTo(5)">Close Stuck Mode</button>
    </section>

    <!-- Screen 5: Exit -->
    <section id="screen-5">
      <h1 id="exit-text">Take care.</h1>
      <p>You’re allowed to rest now.</p>
      <button onclick="exitApp()">Done</button>
    </section>

  </main>

  <script>
    // ---------------- Steps ----------------
    const steps = {
      overloaded: [
        { text: "Take one slow breath. In... and out.", subtext: "That's enough." },
        { text: "Close your eyes for a few seconds.", subtext: "You can pause here." },
        { text: "Stretch your arms slowly.", subtext: "Small movements help." },
        { text: "Roll your shoulders gently.", subtext: "Notice the tension leaving." },
        { text: "Place your hand on your chest and breathe.", subtext: "You’re okay." }
      ],
      "low-energy": [
        { text: "Place your feet firmly on the floor.", subtext: "Feel grounded." },
        { text: "Sit up straight and stretch your back.", subtext: "Just one motion." },
        { text: "Roll your shoulders slowly.", subtext: "Release tightness." },
        { text: "Take a few deep breaths.", subtext: "Let air fill your lungs." },
        { text: "Clench and release your fists a few times.", subtext: "Gentle movement counts." }
      ],
      unsure: [
        { text: "Take a sip of water.", subtext: "Small things still count." },
        { text: "Look outside for a moment.", subtext: "Notice something small." },
        { text: "Touch something nearby intentionally.", subtext: "Ground yourself." },
        { text: "Name three things you can see.", subtext: "Just small observations." },
        { text: "Take a slow exhale.", subtext: "Let it out gently." }
      ]
    };

    // ---------------- Exit Messages ----------------
    const exitMessages = [
      "Take care.",
      "See you soon.",
      "Rest well.",
      "You’ve done enough.",
      "Until next time."
    ];

    // ---------------- Navigation ----------------
    function goTo(screen) {
      document.querySelectorAll("section").forEach(section => {
        section.classList.remove("active");
      });

      if (typeof screen === "number") {
        document.getElementById(`screen-${screen}`).classList.add("active");
      } else {
        document.getElementById(`screen-${screen}`).classList.add("active");
      }
    }

    // ---------------- Choose Step ----------------
    function choose(type) {
      if (type === "overloaded") {
        goTo("breathe");

        const breathText = document.getElementById("breath-text");
        breathText.innerText = "Inhale";

        setTimeout(() => {
          breathText.innerText = "Exhale";
        }, 2000);

        setTimeout(() => {
          const step = steps[type][Math.floor(Math.random() * steps[type].length)];
          document.getElementById("step-text").innerText = step.text;
          document.getElementById("step-subtext").innerText = step.subtext;
          goTo(3);
        }, 4000);

      } else {
        const step = steps[type][Math.floor(Math.random() * steps[type].length)];
        document.getElementById("step-text").innerText = step.text;
        document.getElementById("step-subtext").innerText = step.subtext;
        goTo(3);
      }
    }

    // ---------------- Exit App ----------------
    function exitApp() {
      const message = exitMessages[Math.floor(Math.random() * exitMessages.length)];
      document.body.innerHTML = `
        <div style="
          display:flex;
          justify-content:center;
          align-items:center;
          height:100vh;
          font-family:system-ui;
          font-size:1.4rem;
          text-align:center;
          padding:16px;
        ">
          ${message}
        </div>
      `;
    }
  </script>
</body>
</html>
